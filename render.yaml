databases:
  - name: barangay_connect_db
    plan: free

services:
  - type: web
    name: barangay-connect
    plan: free
    runtime: python
    buildCommand: "./render-build.sh"
    startCommand: "gunicorn barangay_connect.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: barangay_connect_db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"
