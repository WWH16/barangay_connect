<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 960" width="100%" height="100%">
  <defs>
    <!-- Background Gradient: Deep rich navy colors for a professional, secure government/community aesthetic -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#001550" />
      <stop offset="100%" stop-color="#00236f" />
    </linearGradient>
    
    <!-- Icon Gradient: Vibrant golden-yellow/lime gradient to match the accent branding and highlight the icon -->
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="100%" stop-color="#d97706" />
    </linearGradient>

    <!-- Premium subtle drop shadow to lift the icon from the background -->
    <filter id="subtleShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity="0.25" />
    </filter>
  </defs>

  <!-- Rounded base matching modern app icon shapes (rx = 200 for smooth squircle) -->
  <rect width="960" height="960" rx="200" fill="url(#bgGrad)" />

  <!-- Inner border ring to frame the icon elegantly -->
  <rect x="40" y="40" width="880" height="880" rx="160" fill="none" stroke="#ffffff" stroke-width="12" stroke-opacity="0.08" />

  <!-- Material Icon: location_city -->
  <!-- Shifted vertically from the -960 to 0 coordinate space to fit 0 to 960 space perfectly -->
  <g transform="translate(0, 960)" filter="url(#subtleShadow)">
    <path d="M120-120v-560l320-160 320 160v560H560v-280H400v280H120Zm80-80h80v-80h-80v80Zm160 0h80v-80h-80v80Zm160 0h80v-80h-80v80Zm-320-160h80v-80h-80v80Zm160 0h80v-80h-80v80Zm160 0h80v-80h-80v80Zm-320-160h80v-80h-80v80Zm160 0h80v-80h-80v80Zm160 0h80v-80h-80v80Z" fill="url(#iconGrad)" />
  </g>
</svg>
