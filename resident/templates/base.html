{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Barangay Connect{% endblock %}</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            navy: '#00236f',
            'navy-deep': '#001550',
            'navy-mid': '#1a3a8a',
            lime: '#fbbf24',
            'lime-dim': '#d97706',
            sand: '#f0ebe1',
            'sand-mid': '#e8e0d2',
            ink: '#0f1117',
            'ink-muted': '#6b7280',
            'ink-light': '#9ca3af',
            border: '#e5e7eb',
            'border-strong': '#d1d5db',
          },
          fontFamily: {
            sans: ['Poppins', 'system-ui', 'sans-serif'],
            serif: ['Poppins', 'sans-serif'],
            mono: ['Poppins', 'monospace'],
          }
        }
      }
    }
  </script>

  <style type="text/tailwindcss">
    @layer components {
      .btn-primary {
        @apply inline-flex items-center gap-2 rounded-sm bg-navy px-5 py-2.5 text-sm font-medium text-white transition-colors hover:bg-navy-mid;
      }
      .btn-accent {
        @apply inline-flex items-center gap-2 rounded-sm bg-lime px-5 py-2.5 text-sm font-semibold text-navy-deep transition-colors hover:bg-lime-dim;
      }
      .btn-ghost {
        @apply inline-flex items-center gap-2 rounded-sm border border-border-strong bg-transparent px-5 py-2.5 text-sm font-medium text-ink transition-colors hover:bg-sand;
      }
      .form-input {
        @apply w-full rounded-sm border border-border-strong bg-white px-3.5 py-2.5 text-sm text-ink outline-none transition-all focus:border-navy focus:ring-2 focus:ring-navy/10 placeholder:text-ink-light;
      }
      .form-label {
        @apply mb-1.5 block text-xs font-semibold uppercase tracking-wider text-ink-muted;
      }
      .sidebar-link {
        @apply flex items-center gap-3 rounded-sm px-4 py-2.5 text-sm font-medium text-white/60 transition-colors hover:bg-white/10 hover:text-white/90;
      }
      .sidebar-link.active {
        @apply bg-lime font-semibold text-navy-deep;
      }
      .sidebar-link.active i {
        @apply text-navy-deep;
      }
      .metric-card {
        @apply flex flex-col gap-1 rounded-sm border border-border bg-white p-6;
      }
      .section-card {
        @apply rounded-sm border border-border bg-white;
      }
      .tab-btn {
        @apply flex items-center gap-2 border-b-2 border-transparent px-5 py-3 text-sm font-medium text-ink-muted transition-all hover:text-navy;
      }
      .tab-btn.active {
        @apply border-lime font-semibold text-navy;
      }
      .status-badge {
        @apply inline-flex items-center gap-1.5 rounded-sm px-2 py-0.5 text-xs font-medium;
      }
      .status-pending {
        @apply border border-amber-200 bg-amber-50 text-amber-600;
      }
      .status-assigned, .status-in-progress {
        @apply border border-blue-200 bg-blue-50 text-blue-700;
      }
      .status-resolved {
        @apply border border-green-200 bg-green-50 text-green-700;
      }
      .case-id {
        @apply font-mono text-xs font-medium tracking-wide text-navy;
      }
    }

    body {
      background-color: #fafaf8;
      color: #0f1117;
    }

    .bg-grid-pattern {
      background-image: linear-gradient(rgba(255,255,255,1) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,1) 1px, transparent 1px);
      background-size: 32px 32px;
    }

    .bg-line-pattern {
      background-image: repeating-linear-gradient(45deg, white 0, white 1px, transparent 0, transparent 50%);
      background-size: 10px 10px;
    }

    .loading-overlay {
      position: fixed;
      inset: 0;
      background: rgba(255, 255, 255, 0.7);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      backdrop-filter: blur(2px);
    }

    .loader {
      border: 4px solid #e5e7eb;
      border-top: 4px solid #00236f;
      border-radius: 50%;
      width: 48px;
      height: 48px;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>

  {% block extra_head %}{% endblock %}
</head>
<body>
  {% block body %}{% endblock %}

  <script>
    lucide.createIcons();

    function togglePassword(inputId, iconId) {
      const input = document.getElementById(inputId);
      const icon = document.getElementById(iconId);
      if (input.type === 'password') {
        input.type = 'text';
        icon.setAttribute('data-lucide', 'eye-off');
      } else {
        input.type = 'password';
        icon.setAttribute('data-lucide', 'eye');
      }
      lucide.createIcons();
    }

    // Auto-expire system toasts
    document.addEventListener("DOMContentLoaded", function() {
      const toasts = document.querySelectorAll('.system-toast');
      toasts.forEach(function(toast) {
        setTimeout(function() {
          toast.style.opacity = '0';
          toast.style.transform = 'translateY(-10px)';
          setTimeout(function() {
            toast.remove();
          }, 300);
        }, 5000);
      });

      // Global Form Loader (Screen Overlay)
      const globalForms = document.querySelectorAll('form[data-loading-text], form[data-use-global-loader]');
      globalForms.forEach(function(form) {
        form.addEventListener('submit', function() {
          const loadingText = form.getAttribute('data-loading-text');
          showGlobalLoader(loadingText);
        });
      });

      // Simple Button-level Loader
      const normalForms = document.querySelectorAll('form:not([data-loading-text]):not([data-use-global-loader]):not([data-no-loader])');
      normalForms.forEach(function(form) {
        form.addEventListener('submit', function() {
          const btn = form.querySelector('button[type="submit"]');
          if (btn) {
            // Check if form is valid before triggering loader
            if (form.checkValidity && !form.checkValidity()) return;
            
            btn.disabled = true;
            btn.style.opacity = '0.75';
            btn.style.cursor = 'not-allowed';
            
            // Use custom button loading text if specified, otherwise keep original
            const btnText = form.getAttribute('data-btn-loading-text') || btn.textContent.trim();
            
            // Insert inline spinner SVG and text
            const spinnerHtml = `<svg style="display:inline-block;animation:spin 1s linear infinite;margin-right:8px;width:14px;height:14px;vertical-align:middle;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="2" x2="12" y2="6"></line><line x1="12" y1="18" x2="12" y2="22"></line><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"></line><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"></line><line x1="2" y1="12" x2="6" y2="12"></line><line x1="18" y1="12" x2="22" y2="12"></line><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"></line><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"></line></svg>`;
            btn.innerHTML = spinnerHtml + btnText;
          }
        });
      });
    });

    function showGlobalLoader(text) {
      const loader = document.getElementById('global-loader');
      const loaderText = document.getElementById('global-loader-text');
      
      if (loaderText) {
        loaderText.innerText = text ? text : "Processing...";
      }
      
      if (loader) {
        loader.style.display = 'flex';
      }
    }
  </script>

  <div id="global-loader" class="loading-overlay" aria-hidden="true">
    <div style="display:flex;flex-direction:column;align-items:center;gap:12px;">
      <div class="loader"></div>
      <p id="global-loader-text" style="font-size:13px;color:#374151;margin:0;">Processing...</p>
    </div>
    </div>
  </div>

  {% block extra_js %}{% endblock %}
</body>
</html>
